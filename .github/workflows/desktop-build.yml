name: Desktop Installers

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: false
        default: "dev"

jobs:
  # ── Windows → .exe (NSIS) ──────────────────────────────────────────────
  build-windows:
    name: Windows installer (.exe)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tabibpro/apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm run build

      - name: Package Windows installer
        run: pnpm exec electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # pas de code signing (à activer avec certificat EV)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabibPro-Windows
          path: tabibpro/apps/desktop/release/*.exe
          retention-days: 30

  # ── macOS → .dmg ──────────────────────────────────────────────────────
  build-macos:
    name: macOS installer (.dmg)
    runs-on: macos-14  # Apple Silicon (arm64)
    defaults:
      run:
        working-directory: tabibpro/apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm run build

      - name: Package macOS DMG (arm64)
        run: pnpm exec electron-builder --mac --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # à activer avec Apple Developer certificate
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabibPro-macOS
          path: tabibpro/apps/desktop/release/*.dmg
          retention-days: 30

  # ── Release GitHub ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TabibPro-Windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TabibPro-macOS
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## TabibPro Desktop ${{ github.ref_name }}

            ### Installation

            | Plateforme | Fichier | Instructions |
            |---|---|---|
            | **Windows** | `TabibPro Setup *.exe` | Double-cliquer et suivre l'assistant |
            | **macOS** | `TabibPro-*.dmg` | Ouvrir le DMG et glisser vers Applications |

            ### Prérequis
            - **Docker Desktop** doit être installé et démarré avant le premier lancement.
              Télécharger : https://www.docker.com/products/docker-desktop/

            ### Premier lancement
            Les mots de passe de la base de données sont générés automatiquement et stockés localement.
